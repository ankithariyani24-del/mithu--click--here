<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Shivani</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') no-repeat center center/cover;
}

.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
}

.card {
    position: relative;
    background: rgba(255,255,255,0.95);
    padding: 25px;
    border-radius: 20px;
    width: 90%;
    max-width: 340px;
    text-align: center;
    z-index: 2;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

h1 {
    font-size: 18px;
    min-height: 80px;
    line-height: 1.5;
}

button {
    margin: 8px;
    padding: 12px 16px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s;
}

.option {
    background: #f1f2f6;
}

.option:hover {
    transform: scale(1.05);
}

.no {
    position: absolute;
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="card" id="card">
    <h1 id="text"></h1>
    <div id="buttons"></div>
</div>

<canvas id="confetti"></canvas>

<script>

// typing effect
function typeText(text, element, speed = 30) {
    element.innerHTML = "";
    let i = 0;
    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }
    typing();
}

const textEl = document.getElementById("text");
const btnDiv = document.getElementById("buttons");

let step = 0;

// initial
loadStep();

function loadStep() {

    if(step === 0){
        typeText("Shivani…\n\nA Gentleman (personal attendant) has a small request.\nMay I ask?", textEl);

        btnDiv.innerHTML = `
        <button class="option" onclick="next()">Go ahead</button>
        <button class="option" onclick="playfulNo()">Not now</button>
        `;
    }

    else if(step === 1){
        typeText("It’s a normal office morning…\n\nBut mornings feel better with the right company.", textEl);

        btnDiv.innerHTML = `
        <button class="option" onclick="next()">Hmm okay…</button>
        <button class="option" onclick="playfulNo()">Still thinking</button>
        `;
    }

    else if(step === 2){
        typeText("So I was wondering…\n\nWould you like to join me for breakfast before work today?", textEl);

        btnDiv.innerHTML = `
        <button class="option" onclick="yesClick()">Yes, sounds good</button>
        <button class="option no" id="noBtn">Maybe not</button>
        `;

        const noBtn = document.getElementById("noBtn");
        noBtn.addEventListener("mouseenter", moveButton);
        noBtn.addEventListener("touchstart", moveButton);
    }
}

// next step
function next(){
    step++;
    loadStep();
}

// playful reject
function playfulNo(){
    typeText("Hmm… I’ll take that as ‘convince me better’ 🙂", textEl);
}

// YES
function yesClick(){
    startConfetti();

    document.body.innerHTML = `
    <div style="
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        text-align:center;
        background: linear-gradient(135deg,#667eea,#764ba2);
        color:white;
        font-family:sans-serif;
        padding:20px;
    ">
        <h1>
        Nice choice 🙂<br><br>
        Let’s make this morning slightly better.<br>
        See you for breakfast.
        </h1>
    </div>
    `;
}

// moving button
function moveButton() {
    const btn = document.getElementById("noBtn");
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 60);

    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

// confetti
function startConfetti() {
    const canvas = document.getElementById("confetti");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let pieces = [];
    for(let i=0;i<120;i++){
        pieces.push({
            x: Math.random()*canvas.width,
            y: Math.random()*canvas.height,
            r: Math.random()*5+2,
            d: Math.random()*100
        });
    }

    function draw(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "white";
        ctx.beginPath();
        for(let i=0;i<pieces.length;i++){
            let p = pieces[i];
            ctx.moveTo(p.x,p.y);
            ctx.arc(p.x,p.y,p.r,0,Math.PI*2,true);
        }
        ctx.fill();
        update();
    }

    function update(){
        for(let i=0;i<pieces.length;i++){
            let p = pieces[i];
            p.y += Math.cos(p.d)+2;
            if(p.y > canvas.height){
                p.y = 0;
            }
        }
    }

    setInterval(draw, 20);
}

</script>

</body>
</html>
