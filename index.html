<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Highness Shivani 👑</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') no-repeat center center/cover;
    overflow: hidden;
}

.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
}

.card {
    position: relative;
    background: rgba(255,255,255,0.95);
    padding: 25px;
    border-radius: 20px;
    width: 90%;
    max-width: 320px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    z-index: 2;
}

h1 {
    font-size: 18px;
    min-height: 80px;
}

button {
    margin: 8px;
    padding: 12px 18px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    cursor: pointer;
}

.yes { background: #ff6b81; color: white; }
.no { background: #dfe6e9; position: absolute; }

canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="card" id="card">
    <h1 id="text"></h1>
    <button class="yes" onclick="nextStep()">Proceed 💖</button>
</div>

<canvas id="confetti"></canvas>

<script>

// Typing effect
function typeText(text, element, speed = 30) {
    element.innerHTML = "";
    let i = 0;
    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }
    typing();
}

let step = 0;
const textEl = document.getElementById("text");

// Initial text
typeText("👑 My Highness Shivani…\n\nYour humble servant has a request 🥺\nMay I ask something?", textEl);

function nextStep() {
    step++;

    if(step === 1){
        typeText("My Highness Shivani 👑\n\nThis servant has prepared a humble breakfast ☕🥐\nJust for you 💛", textEl);
    }

    else if(step === 2){
        typeText("But… I dare not serve without your permission 🥺\n\nWill you allow me?", textEl);
    }

    else if(step === 3){
        typeText("So… My Highness 👑\n\nWill you come for breakfast with me today? 💛", textEl);

        document.getElementById("card").innerHTML += `
        <button class="yes" onclick="yesClick()">Yes 💖</button>
        <button class="no" id="noBtn">No 🙈</button>
        `;

        const noBtn = document.getElementById("noBtn");
        noBtn.addEventListener("touchstart", moveButton);
        noBtn.addEventListener("click", moveButton);
    }
}

function yesClick(){
    startConfetti();

    document.body.innerHTML += `
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:white;">
        <h1>😍💛 Thank you My Highness!<br>Your servant is honored ☕🥐</h1>
    </div>
    `;
}

// Moving No button
function moveButton() {
    const btn = document.getElementById("noBtn");
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

// Confetti 🎉
function startConfetti() {
    const canvas = document.getElementById("confetti");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let pieces = [];
    for(let i=0;i<150;i++){
        pieces.push({
            x: Math.random()*canvas.width,
            y: Math.random()*canvas.height,
            r: Math.random()*6+2,
            d: Math.random()*150
        });
    }

    function draw(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "gold";
        ctx.beginPath();
        for(let i=0;i<pieces.length;i++){
            let p = pieces[i];
            ctx.moveTo(p.x,p.y);
            ctx.arc(p.x,p.y,p.r,0,Math.PI*2,true);
        }
        ctx.fill();
        update();
    }

    function update(){
        for(let i=0;i<pieces.length;i++){
            let p = pieces[i];
            p.y += Math.cos(p.d)+2;
            if(p.y > canvas.height){
                p.y = 0;
                p.x = Math.random()*canvas.width;
            }
        }
    }

    setInterval(draw, 20);
}

</script>

</body>
</html>
