<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Shivani</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') no-repeat center center/cover;
}

/* dark overlay */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
}

/* card */
.card {
    position: relative;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    padding: 25px;
    border-radius: 20px;
    width: 90%;
    max-width: 340px;
    text-align: center;
    z-index: 2;
    color: white;
}

/* text */
h1 {
    font-size: 18px;
    min-height: 90px;
    line-height: 1.5;
}

/* buttons */
button {
    margin: 8px;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s ease;
    border: none;
}

/* primary button */
.ask {
    background: rgba(255,255,255,0.25);
    color: white;
    border: 1px solid rgba(255,255,255,0.4);
}

/* secondary button */
.later {
    background: rgba(0,0,0,0.3);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
}

/* hover */
button:hover {
    transform: scale(1.05);
}

/* moving no button */
.no {
    position: absolute;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="card">
    <h1 id="text"></h1>
    <div id="buttons"></div>
</div>

<canvas id="confetti"></canvas>

<script>

// typing effect
function typeText(text, element) {
    element.innerHTML = "";
    let i = 0;
    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 25);
        }
    }
    typing();
}

const textEl = document.getElementById("text");
const btnDiv = document.getElementById("buttons");

let step = 0;

loadStep();

function loadStep(){

    if(step === 0){
        typeText("Shivani…\n\nQuick question.\n\nShould I ask or assume you’ll say no?", textEl);

        btnDiv.innerHTML = `
        <button class="ask" onclick="next()">Ask</button>
        <button class="later" onclick="playful()">Not now</button>
        `;
    }

    else if(step === 1){
        typeText("It’s a regular office morning…\n\nBut mornings feel better with the right company.", textEl);

        btnDiv.innerHTML = `
        <button class="ask" onclick="next()">Continue</button>
        <button class="later" onclick="playful()">Hmm</button>
        `;
    }

    else if(step === 2){
        typeText("We’re heading to office anyway.\n\nShall we have breakfast together?", textEl);

        btnDiv.innerHTML = `
        <button class="ask" onclick="yesClick()">Okay, let's go</button>
        <button class="later" onclick="softNo()">Maybe some other day</button>
        <button class="later no" id="noBtn">No</button>
        `;

        const noBtn = document.getElementById("noBtn");
        noBtn.addEventListener("mouseover", moveButton);
        noBtn.addEventListener("touchstart", moveButton);
    }
}

// next step
function next(){
    step++;
    loadStep();
}

// playful response
function playful(){
    typeText("I’ll take that as ‘convince me better’ 🙂", textEl);
}

// soft no
function softNo(){
    typeText("Fair enough… I’ll take a rain check then 🙂", textEl);
}

// yes
function yesClick(){
    startConfetti();

    document.body.innerHTML = `
    <div style="
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        text-align:center;
        background: linear-gradient(135deg,#2b5876,#4e4376);
        color:white;
        font-size:20px;
        padding:20px;
    ">
        <div>
        Good choice 🙂<br><br>
        See you soon.
        </div>
    </div>
    `;
}

// moving no button 😏
function moveButton(){
    const btn = document.getElementById("noBtn");
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 60);

    btn.style.left = x + "px";
    btn.style.top = y + "px";

    typeText("That doesn’t feel like a final answer… 🙂", textEl);
}

// confetti 🎉
function startConfetti(){
    const canvas = document.getElementById("confetti");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let pieces = [];
    for(let i=0;i<120;i++){
        pieces.push({
            x: Math.random()*canvas.width,
            y: Math.random()*canvas.height,
            r: Math.random()*5+2
        });
    }

    function draw(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "white";

        pieces.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
            ctx.fill();
            p.y += 2;
            if(p.y > canvas.height) p.y = 0;
        });
    }

    setInterval(draw, 20);
}

</script>

</body>
</html>
